<svg width="850" height="180" viewBox="0 0 850 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Kubernetes debugging request flow</title>
  <desc id="desc">A browser request passes through ingress, service, pod, and container layers.</desc>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#111827"/>
    </marker>
    <style>
      .box {
        stroke: #1f2937;
        stroke-width: 1.5;
        rx: 8;
      }
      .label {
        fill: #111827;
        font-family: Arial, Helvetica, sans-serif;
        font-size: 15px;
        font-weight: 600;
      }
      .line {
        stroke: #111827;
        stroke-width: 2;
        marker-end: url(#arrow);
      }
    </style>
  </defs>

  <rect width="850" height="180" fill="#ffffff"/>

  <rect class="box" x="20" y="65" width="120" height="50" fill="#e3f2fd"/>
  <text class="label" x="80" y="96" text-anchor="middle">Browser</text>

  <rect class="box" x="170" y="65" width="165" height="50" fill="#e8f5e9"/>
  <text class="label" x="252.5" y="96" text-anchor="middle">Ingress (Nginx)</text>

  <rect class="box" x="365" y="65" width="130" height="50" fill="#fff3e0"/>
  <text class="label" x="430" y="96" text-anchor="middle">Service</text>

  <rect class="box" x="530" y="65" width="110" height="50" fill="#f3e5f5"/>
  <text class="label" x="585" y="96" text-anchor="middle">Pod</text>

  <rect class="box" x="675" y="65" width="130" height="50" fill="#ede7f6"/>
  <text class="label" x="740" y="96" text-anchor="middle">Container</text>

  <line class="line" x1="140" y1="90" x2="167" y2="90"/>
  <line class="line" x1="335" y1="90" x2="362" y2="90"/>
  <line class="line" x1="495" y1="90" x2="527" y2="90"/>
  <line class="line" x1="640" y1="90" x2="672" y2="90"/>
</svg>
